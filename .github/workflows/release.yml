name: Release

# Triggered by `v*` tag push. Builds a static musl binary for each
# target triple, publishes a GitHub release with the binaries attached,
# then (if CARGO_REGISTRY_TOKEN is set) publishes the crate to crates.io.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            asset: bastion.x86_64
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-latest
            asset: bastion.aarch64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Install aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin bastion --target ${{ matrix.target }}

      - name: Rename binary for release asset
        run: |
          mv target/${{ matrix.target }}/release/bastion ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -la release

      - name: Publish GitHub release (rerun-safe)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $TAG already exists; re-uploading assets with --clobber"
            gh release upload "$TAG" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Built from ${GITHUB_SHA}" \
              --repo "$GITHUB_REPOSITORY" \
              release/*
          fi

  crates-io:
    needs: build
    runs-on: ubuntu-latest
    # Publish only if the maintainer has set CARGO_REGISTRY_TOKEN.
    if: ${{ github.repository == 'devopsdefender/bastion' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: cargo publish (dry-run first)
        run: cargo publish --dry-run

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates.io publish."
            exit 0
          fi
          cargo publish
